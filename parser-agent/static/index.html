<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housing Pipeline - 문서 업로드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient-start: #fdfbfb;
            --bg-gradient-end: #ebedee;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4f46e5, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            margin: 0 0 2.5rem 0;
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .dropzone {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--primary);
            background: rgba(79, 70, 229, 0.05);
            transform: translateY(-2px);
        }

        .drop-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary);
            display: inline-block;
        }

        .drop-title {
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .drop-desc {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        input[type="file"] {
            display: none;
        }

        .loading {
            display: none;
            margin-top: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(79, 70, 229, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-container {
            display: none;
            margin-top: 2.5rem;
            text-align: left;
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-height: 300px;
            overflow-y: auto;
        }

        .result-title {
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: #dcfce7;
            color: #166534;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        pre {
            background: #f8fafc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9rem;
            color: #334155;
            margin: 0;
            border: 1px solid #e2e8f0;
        }

        .error-message {
            color: #ef4444;
            background: #fef2f2;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            display: none;
            text-align: left;
            border: 1px solid #fecaca;
        }

        .history-container {
            margin-top: 2.5rem;
            text-align: left;
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-list li {
            padding: 0.75rem 0;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list li:last-child {
            border-bottom: none;
        }
        
        .history-name {
            font-weight: 600;
            color: #334155;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }

        .history-count {
            background: #f1f5f9;
            color: #475569;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .bmc-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
            z-index: 50;
            transition: transform 0.2s;
        }
        .bmc-btn img {
            height: 48px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            border-radius: 12px;
        }
        .bmc-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <a href="https://qr.kakaopay.com/Ej88F1kMG" target="_blank" class="bmc-btn">
        <img src="/static/images/btn_send_regular.png" alt="카카오페이 송금하기">
    </a>

<div class="container">
    <div class="glass-card">
        <h1>Housing Pipeline</h1>
        <p class="subtitle">청약/매물 문서(.pdf, .xlsx)를 업로드하면 자동으로 구조화됩니다.</p>
        
        <div class="api-key-container" id="apiKeyContainer" style="margin-bottom: 1.5rem; display: none;">
            <input type="password" id="geminiKey" placeholder="Gemini API Key 입력 (.env 미설정 시 필수)" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s ease;">
        </div>

        <div class="dropzone" id="dropzone">
            <span class="drop-icon">📄</span>
            <div class="drop-title">클릭하거나 파일을 위로 끌어다 놓으세요</div>
            <div class="drop-desc">지원 형식: PDF, XLSX (최대 3개, 각 10MB)</div>
            <input type="file" id="fileInput" accept=".pdf, .xlsx" multiple>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div id="loadingText">문서를 분석하고 있습니다 (AI 처리 중)...</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-container" id="resultContainer">
            <div class="result-title">
                분석 결과
                <span class="badge" id="resultBadge">0개 파싱됨</span>
            </div>
            <pre id="resultJson"></pre>
        </div>

        <div class="history-container" id="historyContainer">
            <div class="result-title">최근 분석된 공고</div>
            <ul class="history-list" id="historyList">
                <li style="color: #6b7280; font-size: 0.9rem;">불러오는 중...</li>
            </ul>
        </div>
    </div>
</div>

<script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const loading = document.getElementById('loading');
    const resultContainer = document.getElementById('resultContainer');
    const resultJson = document.getElementById('resultJson');
    const resultBadge = document.getElementById('resultBadge');
    const errorMessage = document.getElementById('errorMessage');
    const geminiKeyInput = document.getElementById('geminiKey');
    const apiKeyContainer = document.getElementById('apiKeyContainer');

    // Load initial config and announcements
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/config');
            const data = await res.json();
            if (!data.has_gemini_key) {
                apiKeyContainer.style.display = 'block';
            }
        } catch (e) {
            console.error("설정 정보를 불러오는데 실패했습니다.", e);
        }
        
        loadAnnouncements();
    });

    async function loadAnnouncements() {
        const historyList = document.getElementById('historyList');
        try {
            const res = await fetch('/api/announcements');
            const json = await res.json();
            
            if (json.status === 'success' && json.data.length > 0) {
                historyList.innerHTML = '';
                json.data.forEach(item => {
                    const li = document.createElement('li');
                    
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'history-name';
                    nameSpan.textContent = item.filename;
                    nameSpan.title = item.filename;
                    
                    const countSpan = document.createElement('span');
                    countSpan.className = 'history-count';
                    countSpan.textContent = `${item.house_count}건`;
                    
                    li.appendChild(nameSpan);
                    li.appendChild(countSpan);
                    historyList.appendChild(li);
                });
            } else {
                historyList.innerHTML = '<li style="color: #6b7280; font-size: 0.9rem;">최근 분석된 공고가 없습니다.</li>';
            }
        } catch (e) {
            console.error("공고 목록을 불러오는데 실패했습니다.", e);
            historyList.innerHTML = '<li style="color: #ef4444; font-size: 0.9rem;">목록을 불러오는 중 오류가 발생했습니다.</li>';
        }
    }

    // Drag and drop handlers
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults (e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false);
    });

    dropzone.addEventListener('drop', handleDrop, false);
    dropzone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleDrop(e) {
        let dt = e.dataTransfer;
        let files = dt.files;
        handleFiles(files);
    }

    function handleFiles(files) {
        if (files.length === 0) return;
        
        if (files.length > 3) {
            showError("최대 3개의 파일까지만 업로드 가능합니다.");
            return;
        }

        const validTypes = ['.pdf', '.xlsx'];
        const validFiles = [];

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const extension = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            if (!validTypes.includes(extension)) {
                showError("PDF 또는 XLSX 파일만 업로드 가능합니다.");
                return;
            }
            validFiles.push(file);
        }

        uploadFiles(validFiles);
    }

    async function uploadFiles(files) {
        const formData = new FormData();
        files.forEach(file => formData.append('files', file));
        
        const geminiKey = geminiKeyInput.value.trim();
        if (geminiKey) {
            formData.append('gemini_key', geminiKey);
        }

        // Reset UI
        errorMessage.style.display = 'none';
        resultContainer.style.display = 'none';
        dropzone.style.display = 'none';
        loading.style.display = 'block';

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            loading.style.display = 'none';

            if (response.ok) {
                dropzone.style.display = 'block';
                resultContainer.style.display = 'block';
                
                if (data.data) {
                    resultBadge.textContent = `${data.data.length}개 처리 완료`;
                    resultJson.textContent = JSON.stringify(data.data, null, 2);
                    loadAnnouncements(); // Refresh history
                } else if (data.status === 'warning') {
                    resultBadge.textContent = "내용 없음";
                    resultBadge.style.background = "#fef08a";
                    resultBadge.style.color = "#854d0e";
                    resultJson.textContent = data.message;
                }
            } else {
                dropzone.style.display = 'block';
                showError(`오류: ${data.detail || '알 수 없는 오류가 발생했습니다.'}`);
            }
        } catch (error) {
            loading.style.display = 'none';
            dropzone.style.display = 'block';
            showError(`업로드 실패: 서버와 통신할 수 없습니다.`);
        }
    }

    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.style.display = 'block';
    }
</script>

</body>
</html>
