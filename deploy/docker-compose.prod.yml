version: '3.8'

services:
  # Python Parser Agent
  parser-agent:
    image: ${DOCKER_IMAGE_PARSER:-parser-agent:latest}
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - GEO_AGENT_URL=http://geo-agent:8001/api/enrich
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - mongodb
      - db
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 128M

  # Python Geo Agent
  geo-agent:
    image: ${DOCKER_IMAGE_GEO:-geo-agent:latest}
    restart: always
    environment:
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
    depends_on:
      - db
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 128M

  # Frontend (Vite + Nginx)
  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-frontend:latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - parser-agent
    deploy:
      resources:
        limits:
          memory: 64M

  # Databases
  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      - POSTGRES_USER=housing_user
      - POSTGRES_PASSWORD=housing_password
      - POSTGRES_DB=housing_db
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128M

  admin-agent:
    image: ${DOCKERHUB_USERNAME}/housing-admin:latest
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - GEO_AGENT_URL=http://geo-agent:8001/api/enrich
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - mongodb
      - db
    ports:
      - "8002:8002"

  notice-agent:
    image: ${DOCKER_IMAGE_NOTICE:-notice-agent:latest}
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - NOTICE_CRAWLER_ENABLED=${NOTICE_CRAWLER_ENABLED:-false}
      - NOTICE_CRAWL_INTERVAL_SECONDS=${NOTICE_CRAWL_INTERVAL_SECONDS:-3600}
      - NOTICE_NOTIFY_ON_BOOTSTRAP=${NOTICE_NOTIFY_ON_BOOTSTRAP:-false}
      - SH_NOTICE_URL=${SH_NOTICE_URL:-https://www.i-sh.co.kr/app/lay2/program/S48T561C563/www/brd/m_247/list.do?multi_itm_seq=2}
      - LH_NOTICE_URL=${LH_NOTICE_URL:-https://apply.lh.or.kr/lhapply/apply/wt/wrtanc/selectWrtancList.do?mi=1026}
      - NOTICE_AGENT_TOKEN=${NOTICE_AGENT_TOKEN}
    depends_on:
      - mongodb
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  db_data:
  mongo_data:
  grafana_data:
