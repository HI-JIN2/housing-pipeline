version: '3.8'

services:
  # Python Parser Agent
  parser-agent:
    image: ${DOCKER_IMAGE_PARSER:-parser-agent:latest}
    restart: always
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - GEO_AGENT_URL=http://geo-agent:8000/api/enrich
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - mongodb
      - db
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 128M

  # Python Geo Agent
  geo-agent:
    image: ${DOCKER_IMAGE_GEO:-geo-agent:latest}
    restart: always
    environment:
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 128M

  # Frontend (Vite + Nginx)
  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-frontend:latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - parser-agent
    deploy:
      resources:
        limits:
          memory: 64M

  # Databases
  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      - POSTGRES_USER=housing_user
      - POSTGRES_PASSWORD=housing_password
      - POSTGRES_DB=housing_db
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 128M

  admin-agent:
    image: ${DOCKERHUB_USERNAME}/housing-admin:latest
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - POSTGRES_DSN=postgresql://housing_user:housing_password@postgres:5432/housing_db
      - GEO_AGENT_URL=http://geo-agent:8000/api/enrich
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - mongodb
      - postgres
    networks:
      - housing-network

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  db_data:
  mongo_data:
  grafana_data:
