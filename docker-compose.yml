version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: housing_user
      POSTGRES_PASSWORD: housing_password
      POSTGRES_DB: housing_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  admin-agent:
    build:
      context: .
      dockerfile: admin-agent/Dockerfile
    ports:
      - "8002:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - GEO_AGENT_URL=http://geo-agent:8000/api/enrich
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - mongodb
      - db
    volumes:
      - ./admin-agent:/app/admin-agent
      - ./shared:/app/shared

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  db_data:
  mongo_data:
  grafana_data:
