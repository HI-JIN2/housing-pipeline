version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: housing_user
      POSTGRES_PASSWORD: housing_password
      POSTGRES_DB: housing_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
  mongo_data:
