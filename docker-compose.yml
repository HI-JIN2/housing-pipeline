version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: housing_user
      POSTGRES_PASSWORD: housing_password
      POSTGRES_DB: housing_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  admin-agent:
    build:
      context: .
      dockerfile: admin-agent/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - POSTGRES_DSN=postgresql://housing_user:housing_password@db:5432/housing_db
      - GEO_AGENT_URL=http://geo-agent:8001/api/enrich
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      - mongodb
      - db
    volumes:
      - ./admin-agent:/app/admin-agent
      - ./shared:/app/shared

  notice-agent:
    build:
      context: .
      dockerfile: notice-agent/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - NOTICE_CRAWLER_ENABLED=${NOTICE_CRAWLER_ENABLED:-false}
      - NOTICE_CRAWL_INTERVAL_SECONDS=${NOTICE_CRAWL_INTERVAL_SECONDS:-3600}
      - NOTICE_NOTIFY_ON_BOOTSTRAP=${NOTICE_NOTIFY_ON_BOOTSTRAP:-false}
      - SH_NOTICE_URL=${SH_NOTICE_URL:-https://www.i-sh.co.kr/app/lay2/program/S48T561C563/www/brd/m_247/list.do?multi_itm_seq=2}
      - LH_NOTICE_URL=${LH_NOTICE_URL:-https://apply.lh.or.kr/lhapply/apply/wt/wrtanc/selectWrtancList.do?mi=1026}
      - NOTICE_AGENT_TOKEN=${NOTICE_AGENT_TOKEN}
    depends_on:
      - mongodb
    volumes:
      - ./notice-agent:/app/notice-agent

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  db_data:
  mongo_data:
  grafana_data:
