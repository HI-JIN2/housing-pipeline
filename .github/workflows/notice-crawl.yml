name: Scheduled Notice Crawl

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger-notice-crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.NOTICE_AGENT_BASE_URL }}" || { echo "NOTICE_AGENT_BASE_URL is required"; exit 1; }

      - name: Trigger notice crawl
        env:
          NOTICE_AGENT_BASE_URL: ${{ secrets.NOTICE_AGENT_BASE_URL }}
          NOTICE_AGENT_TOKEN: ${{ secrets.NOTICE_AGENT_TOKEN }}
        run: |
          set -euo pipefail

          URL="${NOTICE_AGENT_BASE_URL%/}/api/notices/run-once"

          if [ -n "${NOTICE_AGENT_TOKEN:-}" ]; then
            curl --fail --show-error --silent \
              -X POST \
              -H "x-notice-token: ${NOTICE_AGENT_TOKEN}" \
              "${URL}"
          else
            curl --fail --show-error --silent \
              -X POST \
              "${URL}"
          fi
