name: Deploy to OCI

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Parser Agent
        uses: docker/build-push-action@v4
        with:
          context: .
          file: parser-agent/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/housing-parser:latest

      - name: Build and Push Geo Agent
        uses: docker/build-push-action@v4
        with:
          context: .
          file: geo-agent/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/housing-geo:latest

      - name: Inject Kakao JS Key
        run: |
          sed -i "s|YOUR_KAKAO_JS_KEY_PLACEHOLDER|${{ secrets.KAKAO_JS_KEY }}|g" frontend/index.html
          grep -q "${{ secrets.KAKAO_JS_KEY }}" frontend/index.html || { echo "Injection failed!"; exit 1; }

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/housing-frontend:latest

      - name: Debug Connectivity
        run: |
          echo "Testing connectivity to ${{ secrets.OCI_HOST }} on port 22..."
          nc -zv -w 5 ${{ secrets.OCI_HOST }} 22 || echo "Connectivity failed!"

      - name: Copy deploy scripts via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "deploy/docker-compose.prod.yml"
          target: "/home/ubuntu/housing-pipeline"

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # Create 2GB Swap file if it doesn't exist (for 1GB RAM stability)
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            mkdir -p /home/ubuntu/housing-pipeline
            cd /home/ubuntu/housing-pipeline
            
            # Ensure ports are open in OS firewall
            sudo iptables -I INPUT -p tcp --dport 80 -j ACCEPT || true
            sudo iptables -I INPUT -p tcp --dport 8000 -j ACCEPT || true
            sudo iptables -I INPUT -p tcp --dport 5173 -j ACCEPT || true
            
            # Ensure Docker and Docker Compose V2 are installed
            if ! command -v docker > /dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker ubuntu
            fi
            
            if ! docker compose version > /dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin || {
                DOCKER_CONFIG=${DOCKER_CONFIG:-$HOME/.docker}
                mkdir -p $DOCKER_CONFIG/cli-plugins
                curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$(uname -m) -o $DOCKER_CONFIG/cli-plugins/docker-compose
                chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose
              }
            fi
            
            # Create .env file for Docker Compose to ensure variables are preserved
            echo "DOCKER_IMAGE_PARSER=${{ secrets.DOCKERHUB_USERNAME }}/housing-parser:latest" > .env
            echo "DOCKER_IMAGE_GEO=${{ secrets.DOCKERHUB_USERNAME }}/housing-geo:latest" >> .env
            echo "DOCKER_IMAGE_FRONTEND=${{ secrets.DOCKERHUB_USERNAME }}/housing-frontend:latest" >> .env
            echo "KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}" >> .env
            
            # Use sudo docker compose with --env-file and specify the project directory
            sudo docker compose --env-file .env -f deploy/docker-compose.prod.yml pull
            sudo docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d --force-recreate
            
            # Diagnostic check with retry loop
            echo "Waiting for services to become ready..."
            for i in {1..30}; do
              if curl -s -f http://localhost/api/health > /dev/null; then
                echo "Health check passed!"
                sudo docker compose -f deploy/docker-compose.prod.yml ps
                exit 0
              fi
              echo "Waiting for backend... (attempt $i/30)"
              sleep 2
            done
            
            echo "Health check failed after 60 seconds! Printing logs..."
            sudo docker compose -f deploy/docker-compose.prod.yml ps
            sudo docker compose -f deploy/docker-compose.prod.yml logs
            exit 1
