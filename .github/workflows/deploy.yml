name: Deploy to OCI

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Parser Agent
        uses: docker/build-push-action@v4
        with:
          context: .
          file: parser-agent/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/housing-parser:latest

      - name: Build and Push Geo Agent
        uses: docker/build-push-action@v4
        with:
          context: .
          file: geo-agent/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/housing-geo:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/housing-frontend:latest

      - name: Deploy to OCI via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd /home/ubuntu/housing-pipeline
            # Copy docker-compose.prod.yml from the latest build if not already there
            # (In a real scenario, you might want to SCP it first or keep it in the VM)
            
            # Simple pull and up
            export DOCKER_IMAGE_PARSER=${{ secrets.DOCKERHUB_USERNAME }}/housing-parser:latest
            export DOCKER_IMAGE_GEO=${{ secrets.DOCKERHUB_USERNAME }}/housing-geo:latest
            export DOCKER_IMAGE_FRONTEND=${{ secrets.DOCKERHUB_USERNAME }}/housing-frontend:latest
            export GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            
            docker compose -f deploy/docker-compose.prod.yml pull
            docker compose -f deploy/docker-compose.prod.yml up -d
